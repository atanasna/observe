apiVersion: observe/v1
kind: QueryCollection

metadata:
  folder: platform/logs

queries:
  logs_raw:
    datasource: opensearch
    request:
      index: app-logs-*
      query:
        match_all: {}

  errors:
    from: logs_raw
    transform:
      - filter:
          field: level
          eq: error
      - select:
          fields: [timestamp, service, status, message]

  server_errors:
    from: errors
    transform:
      - filter:
          field: status
          gte: 500
      - limit: 50
