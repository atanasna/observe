apiVersion: observe/v1
kind: QueryCollection

metadata:
  folder: business/revenue

queries:
  checkout_rate:
    datasource: prometheus
    request:
      query: sum(rate(checkout_completed_total[5m])) by (payment_method)

  checkout_logs:
    datasource: opensearch
    request:
      index: checkout-logs-*
      query:
        match_all: {}

  failed_checkouts:
    from: checkout_logs
    transform:
      - filter:
          field: status
          gte: 500
      - select:
          fields: [timestamp, service, status, message]
      - limit: 20
