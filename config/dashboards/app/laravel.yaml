apiVersion: observe/v1
kind: Dashboard

metadata:
  name: laravel
  title: Laravel
  folder: Apps/Ampeco

variables:
  source:
    type: datasource
    datasource_type: prometheus
    match: /(\w+)-charge/
    label: $1-ds
    formats:
      check: $1-ds-check
      next: $1-ds-next
    default: us-charge
  deployment:
    type: enum
    values: [.*]
    default: .*
  tenant:
    type: enum
    values: [.*]
    default: .*
  roaming_sample_type:
    type: enum
    values: [.*]
    default: .*
  table_entries_sample_type:
    type: enum
    values: [.*]
    default: .*

datasources:
  prometheus:
    ref: ${vars.source}

processors:
  roaming_outbound_requests_2xx:
    inputs:
      deployment: {}
      tenant: {}
      roaming_sample_type: {}
    query:
      name: roaming_outbound_requests_2xx
      inputs:
        deployment: ${inputs.deployment}
        tenant: ${inputs.tenant}
        roaming_sample_type: ${inputs.roaming_sample_type}

datasets:
  roaming_outbound_requests_2xx:
    processor: roaming_outbound_requests_2xx
    inputs:
      deployment: ${vars.deployment}
      tenant: ${vars.tenant}
      roaming_sample_type: ${vars.roaming_sample_type}

panels:
  - id: roaming-outbound-requests-2xx
    title: Roaming outbound requests 2xx
    type: timeseries
    dataset: roaming_outbound_requests_2xx
