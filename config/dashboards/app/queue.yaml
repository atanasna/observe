apiVersion: observe/v1
kind: Dashboard

metadata:
  name: queue
  title: Queue
  folder: applications

variables:
  source:
    type: datasource
    datasource_type: prometheus
  deployment:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_low_running_size
    metric_label: deployment
  priority:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_job_count{deployment="${vars.deployment}"}
    metric_label: priority
    include_all: true
    all_value: .*
    default: .*
  tenant:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_job_count{deployment="${vars.deployment}"}
    metric_label: tenant
    include_all: true
    all_value: .*
    default: .*
  job:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_job_count{deployment="${vars.deployment}"}
    metric_label: exported_job
    include_all: true
    all_value: .*
    default: .*

datasources:
  prometheus:
    ref: ${vars.source}

layout:
  columns: 16

queryRefs:
  - queue
  - queue_job_execution_time

datasets:
  # Pending Jobs
  queue_low_pending:
    query: queue
    label: Low
    inputs:
      deployment: ${vars.deployment}
      state: "pending"
      priority: "low"
  queue_default_pending:
    query: queue
    label: Default
    inputs:
      deployment: ${vars.deployment}
      state: "pending"
      priority: "default"
  queue_high_pending:
    query: queue
    label: High
    inputs:
      deployment: ${vars.deployment}
      state: "pending"
      priority: "high"
  queue_bulk_pending:
    query: queue
    label: Bulk
    inputs:
      deployment: ${vars.deployment}
      state: "pending"
      priority: "bulk"
  # Running Jobs
  queue_low_running:
    query: queue
    label: Low
    inputs:
      deployment: ${vars.deployment}
      state: "running"
      priority: "low"
  queue_default_running:
    query: queue
    label: Default
    inputs:
      deployment: ${vars.deployment}
      state: "running"
      priority: "default"
  queue_high_running:
    query: queue
    label: High
    inputs:
      deployment: ${vars.deployment}
      state: "running"
      priority: "high"
  queue_bulk_running:
    query: queue
    label: Bulk
    inputs:
      deployment: ${vars.deployment}
      state: "running"
      priority: "bulk"
  # Delayed Jobs
  queue_low_delayed:
    query: queue
    label: Low
    inputs:
      deployment: ${vars.deployment}
      state: "delayed"
      priority: "low"
  queue_default_delayed:
    query: queue
    label: Default
    inputs:
      deployment: ${vars.deployment}
      state: "delayed"
      priority: "default"
  queue_high_delayed:
    query: queue
    label: High
    inputs:
      deployment: ${vars.deployment}
      state: "delayed"
      priority: "high"
  queue_bulk_delayed:
    query: queue
    label: Bulk
    inputs:
      deployment: ${vars.deployment}
      state: "delayed"
      priority: "bulk"
  queue_default_execution_time:
    query: queue_job_execution_time
    no_value: 0
    fill_missing: 0
    inputs:
      deployment: ${vars.deployment}
      tenant: ${vars.tenant}
      job: ${vars.job}
      priority: "default"

panels:
  - id: pending
    title: Pending
    description: Pending queue size by priority for the selected deployment.
    type: timeseries
    legend:
      position: right
    stacked: true
    layout:
      width: full
      height: 300
    datasets:
      - queue_high_pending
      - queue_default_pending
      - queue_low_pending
      - queue_bulk_pending
  - id: running
    title: Running
    description: Running queue size by priority for the selected deployment.
    type: timeseries
    legend:
      position: right
    stacked: true
    layout:
      width: 8
      height: 240
    datasets:
      - queue_high_running
      - queue_default_running
      - queue_low_running
      - queue_bulk_running
  - id: delayed
    description: Delayed queue size by priority for the selected deployment.
    title: Delayed
    type: timeseries
    legend:
      position: right
    stacked: true
    layout:
      width: 8
      height: 240
    datasets:
      - queue_high_delayed
      - queue_default_delayed
      - queue_low_delayed
      - queue_bulk_delayed

  - id: experimental
    title: Experimental
    type: row
    collapsed: true

  - id: execution-time
    title: Execution Time
    description: Average execution time for the top 10 default-priority jobs by tenant and job.
    type: timeseries
    legend:
      position: right
      format: "{{tenant}} - {{priority}} - {{exported_job}}"
    layout:
      width: 8
      height: 300 
    dataset: queue_default_execution_time
