apiVersion: observe/v1
kind: Dashboard

metadata:
  name: queue
  title: Queue
  folder: applications

variables:
  source:
    type: datasource
    datasource_type: prometheus
  deployment:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_low_running_size
    metric_label: deployment
  priority:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_job_count{deployment="${vars.deployment}"}
    metric_label: priority
    include_all: true
    all_value: .*
    default: .*
  tenant:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_job_count{deployment="${vars.deployment}"}
    metric_label: tenant
    include_all: true
    all_value: .*
    default: .*
  job:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_job_count{deployment="${vars.deployment}"}
    metric_label: exported_job
    include_all: true
    all_value: .*
    default: .*

datasources:
  prometheus:
    ref: ${vars.source}

layout:
  columns: 16

datasetRefs:
  # Pending Jobs
  queue_low_pending:
    dataset: queue_low_pending
    inputs:
      deployment: ${vars.deployment}
  queue_default_pending:
    dataset: queue_default_pending
    inputs:
      deployment: ${vars.deployment}
  queue_high_pending:
    dataset: queue_high_pending
    inputs:
      deployment: ${vars.deployment}
  queue_bulk_pending:
    dataset: queue_bulk_pending
    inputs:
      deployment: ${vars.deployment}
  # Running Jobs
  queue_low_running:
    dataset: queue_low_running
    inputs:
      deployment: ${vars.deployment}
  queue_default_running:
    dataset: queue_default_running
    inputs:
      deployment: ${vars.deployment}
  queue_high_running:
    dataset: queue_high_running
    inputs:
      deployment: ${vars.deployment}
  queue_bulk_running:
    dataset: queue_bulk_running
    inputs:
      deployment: ${vars.deployment}
  # Delayed Jobs
  queue_low_delayed:
    dataset: queue_low_delayed
    inputs:
      deployment: ${vars.deployment}
  queue_default_delayed:
    dataset: queue_default_delayed
    inputs:
      deployment: ${vars.deployment}
  queue_high_delayed:
    dataset: queue_high_delayed
    inputs:
      deployment: ${vars.deployment}
  queue_bulk_delayed:
    dataset: queue_bulk_delayed
    inputs:
      deployment: ${vars.deployment}
  queue_default_jobs_et:
    dataset: queue_default_jobs_et
    inputs:
      deployment: ${vars.deployment}
      tenant: ${vars.tenant}
      job: ${vars.job}

panels:
  - id: pending
    title: Pending
    description: Pending queue size by priority for the selected deployment.
    type: timeseries
    legend:
      position: right
    stacked: true
    layout:
      width: full
      height: 300
    datasets:
      - name: queue_high_pending
        legend:
          format: High
      - name: queue_default_pending
        legend:
          format: Default
      - name: queue_low_pending
        legend:
          format: Low
      - name: queue_bulk_pending
        legend:
          format: Bulk
  - id: running
    title: Running
    description: Running queue size by priority for the selected deployment.
    type: timeseries
    legend:
      position: right
    stacked: true
    layout:
      width: 8
      height: 240
    datasets:
      - name: queue_high_running
        legend:
          format: High
      - name: queue_default_running
        legend:
          format: Default
      - name: queue_low_running
        legend:
          format: Low
      - name: queue_bulk_running
        legend:
          format: Bulk
  - id: delayed
    description: Delayed queue size by priority for the selected deployment.
    title: Delayed
    type: timeseries
    legend:
      position: right
    stacked: true
    layout:
      width: 8
      height: 240
    datasets:
      - name: queue_high_delayed
        legend:
          format: High
      - name: queue_default_delayed
        legend:
          format: Default
      - name: queue_low_delayed
        legend:
          format: Low
      - name: queue_bulk_delayed
        legend:
          format: Bulk

  - id: experimental
    title: Experimental
    type: row
    collapsed: true

  - id: execution-time
    title: Execution Time
    description: Average execution time for the top 10 default-priority jobs by tenant and job.
    type: timeseries
    legend:
      position: right
    layout:
      width: 8
      height: 300 
    datasets:
      - name: queue_default_jobs_et
        legend:
          format: "{{tenant}} - {{priority}} - {{exported_job}}"
