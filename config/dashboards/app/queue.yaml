apiVersion: observe/v1
kind: Dashboard

metadata:
  name: queue
  title: Queue
  folder: applications

variables:
  source:
    type: datasource
    datasource_type: prometheus
  deployment:
    type: label_values
    datasource: ${vars.source}
    metric: app_queue_low_running_size
    metric_label: deployment

datasources:
  prometheus:
    ref: ${vars.source}

layout:
  columns: 16

queryRefs:
  - queue

datasets:
  # Pending Jobs
  queue_low_pending:
    query: queue
    label: Low
    inputs:
      deployment: ${vars.deployment}
      state: "pending"
      priority: "low"
  queue_default_pending:
    query: queue
    label: Default
    inputs:
      deployment: ${vars.deployment}
      state: "pending"
      priority: "default"
  queue_high_pending:
    query: queue
    label: High
    inputs:
      deployment: ${vars.deployment}
      state: "pending"
      priority: "high"
  queue_bulk_pending:
    query: queue
    label: Bulk
    inputs:
      deployment: ${vars.deployment}
      state: "pending"
      priority: "bulk"
  # Running Jobs
  queue_low_running:
    query: queue
    label: Low
    inputs:
      deployment: ${vars.deployment}
      state: "running"
      priority: "low"
  queue_default_running:
    query: queue
    label: Default
    inputs:
      deployment: ${vars.deployment}
      state: "running"
      priority: "default"
  queue_high_running:
    query: queue
    label: High
    inputs:
      deployment: ${vars.deployment}
      state: "running"
      priority: "high"
  queue_bulk_running:
    query: queue
    label: Bulk
    inputs:
      deployment: ${vars.deployment}
      state: "running"
      priority: "bulk"
  # Delayed Jobs
  queue_low_delayed:
    query: queue
    label: Low
    inputs:
      deployment: ${vars.deployment}
      state: "delayed"
      priority: "low"
  queue_default_delayed:
    query: queue
    label: Default
    inputs:
      deployment: ${vars.deployment}
      state: "delayed"
      priority: "default"
  queue_high_delayed:
    query: queue
    label: High
    inputs:
      deployment: ${vars.deployment}
      state: "delayed"
      priority: "high"
  queue_bulk_delayed:
    query: queue
    label: Bulk
    inputs:
      deployment: ${vars.deployment}
      state: "delayed"
      priority: "bulk"

panels:
  - id: pending
    title: Pending
    description: Pending queue size by priority for the selected deployment.
    type: timeseries
    stacked: true
    layout:
      width: full
      height: 300
    datasets:
      - queue_default_pending
      - queue_low_pending
      - queue_high_pending
      - queue_bulk_pending
  - id: running
    title: Running
    description: Running queue size by priority for the selected deployment.
    type: timeseries
    stacked: true
    layout:
      width: 8
      height: 240
    datasets:
      - queue_default_running
      - queue_low_running
      - queue_high_running
      - queue_bulk_running
  - id: delayed
    description: Delayed queue size by priority for the selected deployment.
    title: Delayed
    type: timeseries
    stacked: true
    layout:
      width: 8
      height: 240
    datasets:
      - queue_default_delayed
      - queue_low_delayed
      - queue_high_delayed
      - queue_bulk_delayed
