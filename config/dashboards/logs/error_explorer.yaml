apiVersion: observe/v1
kind: Dashboard

metadata:
  name: error-explorer
  title: Error Explorer
  folder: platform/logs

variables:
  environment:
    type: enum
    values: [prod, stg]
    default: prod
  region:
    type: enum
    values: [eu, us]
    default: us

datasources:
  opensearch:
    ref: ${vars.environment}-${vars.region}-os

processors:
  logs_raw:
    query: logs_raw

  errors:
    from: logs_raw
    transform:
      - filter:
          field: level
          eq: error
      - select:
          fields: [timestamp, service, status, message]

  server_errors:
    from: errors
    transform:
      - filter:
          field: status
          gte: 500
      - limit: 50

datasets:
  errors:
    processor: errors

  server_errors:
    processor: server_errors

panels:
  - id: error-count
    title: Error Count
    type: stat
    dataset: errors

  - id: server-errors
    title: Server Errors
    type: table
    dataset: server_errors
